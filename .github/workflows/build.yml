name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # 1. 拉取代码
      # ------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # 2. 安装 Node.js（Capacitor 构建依赖）
      # ------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ------------------------------------------------------------
      # 3. 安装 JDK 17（Android Gradle Plugin 8 要求）
      # ------------------------------------------------------------
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ------------------------------------------------------------
      # 4. 配置 Android SDK
      # ------------------------------------------------------------
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      # ------------------------------------------------------------
      # 5. 下载 exifr 库到 www/vendor（保证 APK 离线可用）
      # ------------------------------------------------------------
      - name: Download exifr library
        run: |
          mkdir -p www/vendor
          curl -L -o www/vendor/exifr.min.js https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.min.js
          ls -lh www/vendor/

      # ------------------------------------------------------------
      # 6. 安装 npm 依赖
      # ------------------------------------------------------------
      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      # ------------------------------------------------------------
      # 7. 添加 Android 平台（首次构建会自动生成 android/ 目录）
      # ------------------------------------------------------------
      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      # ------------------------------------------------------------
      # 8. 添加 Android 权限声明
      #    Capacitor 不会自动添加权限到 AndroidManifest.xml
      #    需要手动添加 READ_MEDIA_IMAGES 等权限
      # ------------------------------------------------------------
      - name: Add Android permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            # 使用 echo 和 sed 组合添加权限
            echo "添加 Android 权限..."
            sed -i 's|</manifest>|  <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n  <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n  <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n  <uses-permission android:name="android.permission.CAMERA" />\n</manifest>|' "$MANIFEST"
            echo "✅ Android 权限已添加"
          else
            echo "⚠️ AndroidManifest.xml 未找到"
          fi

      # ------------------------------------------------------------
      # 9. 同步 web 资源到 Android 项目
      # ------------------------------------------------------------
      - name: Sync Capacitor
        run: npx cap sync android

      # ------------------------------------------------------------
      # 10. 编译 Debug APK
      # ------------------------------------------------------------
      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      # ------------------------------------------------------------
      # 11. 重命名为「相机水印.apk」
      # ------------------------------------------------------------
      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk "output/相机水印.apk"
          ls -lh output/

      # ------------------------------------------------------------
      # 12. 上传 APK 作为构建产物
      # ------------------------------------------------------------
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: camera-watermark-apk
          path: output/相机水印.apk
          if-no-files-found: error

      # ------------------------------------------------------------
      # 13. 在打 tag 时自动创建 Release 并附带 APK
      # ------------------------------------------------------------
      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: output/相机水印.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
